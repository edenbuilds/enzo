<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title description">
  <title id="title">Enzo audit workspace</title>
  <desc id="description">An editorial product audit workspace framed in navy with evidence findings and a Vision Brief.</desc>
  <rect width="1440" height="760" rx="24" fill="#0b2e3c"/>
  <rect x="26" y="26" width="1388" height="708" rx="20" fill="#f7f6f5"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0b2e3c" font-size="13" letter-spacing="2">
    <text x="72" y="82">EI</text><text x="112" y="82" font-family="Arial, sans-serif" font-weight="600" letter-spacing="0">Enzo</text>
    <text x="1115" y="82">AUDIT  /  ACTIVE</text>
  </g>
  <line x1="72" y1="116" x2="1368" y2="116" stroke="#0b2e3c" stroke-opacity=".16"/>
  <g transform="translate(72 164)">
    <rect width="285" height="510" rx="12" fill="#fff"/>
    <text x="28" y="46" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.5">EVIDENCE MAP</text>
    <circle cx="66" cy="106" r="24" fill="#ffe96f"/><text x="58" y="113" fill="#0b2e3c" font-family="Georgia, serif" font-size="23">7</text>
    <text x="104" y="101" fill="#0b2e3c" font-family="Arial, sans-serif" font-size="15">captures linked</text>
    <text x="104" y="124" fill="#0b2e3c" fill-opacity=".64" font-family="Arial, sans-serif" font-size="13">desktop + mobile</text>
    <g fill="#0b2e3c" font-family="Arial, sans-serif" font-size="14">
      <text x="28" y="194">Overview</text><text x="28" y="234">Clarity</text><text x="28" y="274">Conversion</text><text x="28" y="314">Trust</text><text x="28" y="354">Positioning</text>
    </g>
    <rect x="24" y="430" width="237" height="52" rx="8" fill="#0b2e3c"/><text x="68" y="462" fill="#f7f6f5" font-family="Arial, sans-serif" font-size="14">Generate Vision Brief</text>
  </g>
  <g transform="translate(389 164)">
    <text x="0" y="25" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.5">THE DECISIVE FINDING</text>
    <text x="0" y="94" fill="#0b2e3c" font-family="Georgia, serif" font-size="54">The promise arrives</text>
    <text x="0" y="151" fill="#0b2e3c" font-family="Georgia, serif" font-size="54">after the proof.</text>
    <text x="0" y="199" fill="#0b2e3c" font-family="Arial, sans-serif" font-size="18">Reorder the first screen so a buyer can identify the outcome,</text>
    <text x="0" y="226" fill="#0b2e3c" font-family="Arial, sans-serif" font-size="18">mechanism, and credible next step without interpretation.</text>
    <g transform="translate(0 276)">
      <rect width="306" height="184" rx="12" fill="#fff"/>
      <text x="24" y="39" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.3">OBSERVATION  01</text>
      <text x="24" y="82" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Three competing</text><text x="24" y="113" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">messages lead.</text>
      <text x="24" y="151" fill="#0b2e3c" fill-opacity=".66" font-family="Arial, sans-serif" font-size="13">Evidence: homepage · desktop</text>
    </g>
    <g transform="translate(322 276)">
      <rect width="306" height="184" rx="12" fill="#fff"/>
      <text x="24" y="39" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.3">OPPORTUNITY  01</text>
      <text x="24" y="82" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Lead with the</text><text x="24" y="113" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">decision unlocked.</text>
      <rect x="24" y="139" width="116" height="25" rx="8" fill="#ffe96f"/><text x="36" y="156" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="10">HIGH LEVERAGE</text>
    </g>
    <g transform="translate(644 276)">
      <rect width="306" height="184" rx="12" fill="#e5e3e1"/>
      <text x="24" y="39" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.3">NEXT ACTION</text>
      <text x="24" y="82" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Prototype one</text><text x="24" y="113" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">revised first screen.</text>
      <text x="24" y="151" fill="#0b2e3c" fill-opacity=".66" font-family="Arial, sans-serif" font-size="13">Test with five target users.</text>
    </g>
  </g>
</svg>
