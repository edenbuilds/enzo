<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title description">
  <title id="title">Enzo audit workspace</title>
  <desc id="description">Dark-theme-safe preview of the Enzo editorial audit workspace.</desc>
  <rect width="1440" height="760" rx="24" fill="#071f29"/>
  <rect x="26" y="26" width="1388" height="708" rx="20" fill="#f7f6f5"/>
  <rect x="72" y="164" width="285" height="510" rx="12" fill="#fff"/>
  <circle cx="138" cy="270" r="24" fill="#ffe96f"/>
  <rect x="96" y="594" width="237" height="52" rx="8" fill="#0b2e3c"/>
  <g fill="#0b2e3c">
    <text x="72" y="82" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2">EI   Enzo</text>
    <text x="1115" y="82" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2">AUDIT  /  ACTIVE</text>
    <text x="389" y="189" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2">THE DECISIVE FINDING</text>
    <text x="389" y="258" font-family="Georgia, serif" font-size="54">The promise arrives</text>
    <text x="389" y="315" font-family="Georgia, serif" font-size="54">after the proof.</text>
    <text x="389" y="365" font-family="Arial, sans-serif" font-size="18">Every conclusion links back to observable evidence.</text>
  </g>
  <g transform="translate(389 440)">
    <rect width="306" height="184" rx="12" fill="#fff"/><rect x="322" width="306" height="184" rx="12" fill="#fff"/><rect x="644" width="306" height="184" rx="12" fill="#e5e3e1"/>
    <text x="24" y="45" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11">OBSERVATION</text><text x="346" y="45" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11">OPPORTUNITY</text><text x="668" y="45" fill="#0b2e3c" font-family="ui-monospace, monospace" font-size="11">NEXT ACTION</text>
    <text x="24" y="98" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Name the ambiguity.</text><text x="346" y="98" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Reveal the leverage.</text><text x="668" y="98" fill="#0b2e3c" font-family="Georgia, serif" font-size="25">Make the move explicit.</text>
